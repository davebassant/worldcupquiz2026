{% extends 'base.html' %}
{% block title %}Login - World Cup 2026{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Family Login</h2>
    <form method="POST" action="{{ url_for('main.login') }}">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Select Your Profile</label>
            <select name="username" id="username" class="w-full border rounded-md px-3 py-2 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% for name in usernames %}
                    <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-6">
            <label for="pin" class="block text-gray-700 text-sm font-bold mb-2">Enter PIN</label>
            <input type="password" name="pin" id="pin" required maxlength="4" placeholder="••••"
                   class="w-full border rounded-md px-3 py-2 text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="mt-2 text-xs text-gray-500 text-center">Default PIN is 0000</p>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
            Login
        </button>
    </form>
</div>
{% endblock %}
